- defaults:
    link:
      force: true
      create: true

- clean: ['~']        # remove dead symlinks
- create:
    - ~/.config/zsh
    - ~/.cache/zsh
    - ~/.local/state/tmux
    - ~/.config/lsd

- link:
    ~/.config/nvim: .config/nvim
    ~/.config/karabiner: .config/karabiner
    ~/.config/zsh/.zshrc: .config/zsh/.zshrc
    ~/.config/zsh/.zprofile: .config/zsh/.zprofile
    ~/.config/zsh/general.zsh: .config/zsh/general.zsh
    ~/.zshenv: .zshenv
    ~/.config/tmux/tmux.conf: .config/tmux/tmux.conf
    ~/.config/wezterm/wezterm.lua: .config/wezterm/wezterm.lua
    ~/.config/oh-my-posh: .config/oh-my-posh
    ~/.config/lazygit/config.yml: .config/lazygit/config.yml
    ~/.config/lsd/config.yaml: .config/lsd/config.yaml
    ~/.config/lsd/colors.yaml: .config/lsd/colors.yaml

- shell:
    - command: '[ -d "$HOME/.oh-my-zsh" ] || sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'
      description: Install Oh My Zsh
